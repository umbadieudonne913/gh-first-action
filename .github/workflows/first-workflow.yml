name: CI Pipeline avec Framework DevSecOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://chatty-carrots-train.loca.lt"
        with:
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.projectName=${{ github.event.repository.name }}
            -Dsonar.projectVersion=${{ github.run_number }}
            -Dsonar.host.url=https://chatty-carrots-train.loca.lt

      - name: Wait for SonarQube processing
        run: sleep 15

      - name: Framework Decision
        env:
          PROJECT_KEY: ${{ github.event.repository.name }}
          PIPELINE_NAME: ${{ github.run_id }}
        run: |
          echo "🔹 Appel de l'API pour la décision du Framework..."
          
          FRAMEWORK_URL="https://puny-teams-hear.loca.lt"
          
          RESPONSE=$(curl -s "${FRAMEWORK_URL}/evaluation/decide/sonar/${PROJECT_KEY}/${PIPELINE_NAME}")
          
          echo "Framework response: ${RESPONSE}"
          
          if echo "$RESPONSE" | grep -q '"decision":"FAIL"'; then
            echo "❌ Pipeline bloqué par le Framework DevSecOps"
            exit 1
          else
            echo "✅ Pipeline autorisé par le Framework"
          fi

      - name: Build
        run: |
          echo "🔹 Build en cours..."
          # Ajoute tes commandes de build ici
          # mvn clean install
          # npm install && npm run build

      - name: Deploy
        if: success()
        run: |
          echo "🔹 Déploiement en cours..."
          echo "✅ Application déployée avec succès!"
