name: CI Pipeline avec Framework DevSecOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Framework Decision
        run: |
          echo "🔹 Appel de l'API pour la décision du Framework..."
          
          FRAMEWORK_URL="https://framework-stable.loca.lt"
          PROJECT_KEY="${{ github.event.repository.name }}"
          PIPELINE_NAME="${{ github.run_id }}"
          
          RESPONSE=$(curl -s "${FRAMEWORK_URL}/evaluation/decide/sonar/${PROJECT_KEY}/${PIPELINE_NAME}")
          
          echo "Framework response: ${RESPONSE}"
          
          if echo "$RESPONSE" | grep -q '"decision":"FAIL"'; then
            echo "❌ Pipeline bloqué par le Framework DevSecOps"
            exit 1
          else
            echo "✅ Pipeline autorisé par le Framework"
          fi

      - name: Build
        run: |
          echo "🔹 Build en cours..."
