name: CI Pipeline avec Framework DevSecOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Framework Decision
        run: |
          echo "🔹 Appel de l'API pour la décision du Framework..."
          
          FRAMEWORK_URL="https://framework-stable.loca.lt"
          
          RESPONSE=$(curl -s -X POST "${FRAMEWORK_URL}/evaluation/decide" \
            -H "Content-Type: application/json" \
            -d '{
              "pipeline_type": "github",
              "pipeline_name": "${{ github.run_id }}",
              "project_name": "${{ github.event.repository.name }}",
              "metrics": {
                "quality_gate": "PASSED",
                "bugs": 0,
                "vulnerabilities": 0,
                "code_smells": 17,
                "security_hotspots": 0,
                "coverage": 75,
                "duplications": 3
              }
            }')
          
          echo "Framework response: ${RESPONSE}"
          
          if echo "$RESPONSE" | grep -q '"decision":"REJECTED"'; then
            echo "❌ Pipeline bloqué par le Framework DevSecOps"
            exit 1
          else
            echo "✅ Pipeline autorisé par le Framework"
          fi

      - name: Build
        run: |
          echo "🔹 Build en cours..."
          echo "🚀 Build terminé avec succès!"
