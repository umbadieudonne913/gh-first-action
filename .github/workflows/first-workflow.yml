name: Test Framework Only

on:
  workflow_dispatch:

jobs:
  test-framework:
    runs-on: ubuntu-latest
    
    steps:
      - name: Test Framework Decision
        run: |
          echo "🔹 Test de l'API Framework..."
          
          FRAMEWORK_URL="https://puny-teams-hear.loca.lt"
          
          # Tester la connexion
          echo "1. Test de connexion au Framework..."
          curl -s "${FRAMEWORK_URL}/evaluation/config" || echo "Framework non accessible"
          
          # Tester une décision
          echo ""
          echo "2. Test de l'API de décision..."
          
          RESPONSE=$(curl -s -X POST "${FRAMEWORK_URL}/evaluation/decide" \
            -H "Content-Type: application/json" \
            -d '{
              "pipeline_type": "github",
              "pipeline_name": "test-action",
              "project_name": "gh-first-action",
              "metrics": {
                "quality_gate": "PASSED",
                "bugs": 0,
                "vulnerabilities": 0,
                "code_smells": 17,
                "security_hotspots": 0,
                "coverage": 0,
                "duplications": 0
              }
            }')
          
          echo "Response: ${RESPONSE}"
          
          if echo "$RESPONSE" | grep -q '"decision":"REJECTED"'; then
            echo "❌ Décision: REJETÉ"
            exit 1
          else
            echo "✅ Décision: APPROUVÉ"
          fi
